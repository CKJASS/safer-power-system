<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safer Power Group - New Requisition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .card { border-radius: 12px; }
        .header-logo { max-height: 50px; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="col-12 col-lg-10 mx-auto">
        <div class="card p-4 shadow-sm bg-white">
            <div class="d-flex align-items-center mb-4">
                <!-- Logo Applied Verbatim -->
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Safer Power Group Logo" class="header-logo">
                <div>
                    <h3 class="fw-bold m-0 text-dark">Material & Services Requisition</h3>
                    <p class="text-muted m-0 small">Safer Power Group Authorization Chain</p>
                </div>
            </div>
            <hr>

            <form method="POST" action="{{ url_for('new_requisition') }}">
                <div class="row mb-3">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label class="form-label fw-bold">Requestor Name</label>
                        <input type="text" class="form-control bg-light" value="{{ session['user_name'] }}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Date</label>
                        <input type="text" class="form-control bg-light" value="{{ datetime_now }}" readonly>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Reason for Request / Business Justification</label>
                    <textarea name="reason" class="form-control" rows="3" required placeholder="Provide clear descriptions of what operations these assets/services support..."></textarea>
                </div>

                <h5 class="fw-bold text-secondary mb-3">Items Requested</h5>
                
                <div id="items-container">
                    <div class="row g-2 align-items-end item-row mb-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label small text-muted">Item Description / Specification Option</label>
                            <input type="text" name="description[]" class="form-control" required placeholder="e.g., Cat6 Network Cable Roll">
                        </div>
                        <div class="col-6 col-md-2">
                            <label class="form-label small text-muted">Quantity</label>
                            <input type="number" name="quantity[]" class="form-control" min="1" required placeholder="1">
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label small text-muted">Estimated Unit Cost (KES)</label>
                            <input type="number" step="0.01" name="cost[]" class="form-control" min="0" required placeholder="0.00">
                        </div>
                        <div class="col-12 col-md-1 text-md-center">
                            <button type="button" class="btn btn-outline-danger w-100 remove-item-btn">X</button>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <button type="button" id="add-item-btn" class="btn btn-sm btn-outline-primary">+ Add Another Item Row</button>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-light border">Cancel & Exit</a>
                    <button type="submit" class="btn btn-warning px-4 fw-bold text-white">Route to Supervisor</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('add-item-btn').addEventListener('click', function() {
        const container = document.getElementById('items-container');
        const originalRow = document.querySelector('.item-row');
        const newRow = originalRow.cloneNode(true);
        
        newRow.querySelectorAll('input').forEach(input => input.value = '');
        container.appendChild(newRow);
        attachDeleteEvents();
    });

    function attachDeleteEvents() {
        document.querySelectorAll('.remove-item-btn').forEach(button => {
            button.onclick = function() {
                const totalRows = document.querySelectorAll('.item-row').length;
                if(totalRows > 1) {
                    this.closest('.item-row').remove();
                } else {
                    alert('Requisitions require at least 1 transactional line item entry.');
                }
            };
        });
    }
    attachDeleteEvents();
</script>
</body>
</html>
